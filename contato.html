<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Contato</title>
</head>
<body>
    <form method="post" action="contato.php">
        <label for="nome">Nome</label>
        <input type="text" id="nome">
        <label for="email">Email</label>
        <input type="email" id="email" required>
        <label for="tempo">Tempo desejado para desenvolvimento (em dias)</label>
        <input type="number" min="10" id="tempo">
        <label for="tipo-servico">Tipos de serviço</label>
        <select name="tipo-servico" id="tipo-servico">
            <option value="" disabled selected>Selecione um serviço...</option>
            <option value="app-front">Aplicação Front-End</option>
            <option value="app-back">Aplicação Back-End</option>
            <option value="app-full">Aplicação Full Stack</option>
        </select>
        <button type="submit">Enviar</button>
    </form>
</body>
</html>
