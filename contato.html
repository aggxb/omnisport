<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contato - OmniSport</title>
</head>
<body>
    <header>
        <span>OmniSport</span>
        <nav>
            <ul>
                <li><a href="index.html">Sobre</a></li>
                <li><a href="index.html">Nossos Serviços</a></li>
                <li><a href="contato.html">Contato</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <section>
            <h1>Fale com a OmniSport</h1>
            <p>Seja você um aluno, instrutor ou futuro parceiro, estamos aqui para ouvir.</p>
            
            <form action="#" method="POST">
                
                <div>
                    <label for="nome">Nome Completo:</label>
                    <input type="text" id="nome" name="nome" required>
                </div>

                <div>
                    <label for="email">E-mail:</label>
                    <input type="email" id="email" name="email" required>
                </div>

                <div>
                    <label for="perfil">Qual o seu perfil?</label>
                    <select id="perfil" name="perfil" required>
                        <option value="">Selecione uma opção...</option>
                        <option value="aluno">Aluno / Praticante</option>
                        <option value="instrutor">Instrutor Esportivo</option>
                        <option value="parceiro">Academia / Espaço Físico</option>
                    </select>
                </div>

                <div>
                    <label for="assunto">Sobre o que deseja falar?</label>
                    <select id="assunto" name="assunto" required>
                        <option value="">Selecione um assunto...</option>
                        <option value="duvida">Dúvidas Gerais</option>
                        <option value="suporte">Suporte Técnico</option>
                        <option value="parceria">Parceria Comercial</option>
                    </select>
                </div>

                <div>
                    <label for="mensagem">Sua Mensagem:</label><br>
                    <textarea id="mensagem" name="mensagem" rows="5" required></textarea>
                </div>

                <button type="submit">Enviar Mensagem</button>

            </form>
        </section>
    </main>

    <footer>
        <p>OmniSport. 2026.</p>
    </footer>
    </body>
</html>
